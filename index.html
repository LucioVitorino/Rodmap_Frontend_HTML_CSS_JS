<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Roadmap</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Frontend Roadmap</h1>
    <p>Plano de estudo progressivo para HTML, CSS e JavaScript</p>
</header>

<section class="progress-section">
    <h2>Progresso</h2>
    <div class="progress-bar">
        <div id="progress"></div>
    </div>
</section>

<main>

    <!-- FASE 1 -->
    <section class="phase">
        <h2>Fase 1 — Fundamentos</h2>

        <label>
            <input type="checkbox" class="task">
            HTML Semântico
        </label>

        <label>
            <input type="checkbox" class="task">
            Forms e Inputs
        </label>

        <label>
            <input type="checkbox" class="task">
            CSS Box Model
        </label>

        <label>
            <input type="checkbox" class="task">
            Flexbox
        </label>

        <label>
            <input type="checkbox" class="task">
            CSS Grid
        </label>

    </section>


    <!-- FASE 2 -->
    <section class="phase">
        <h2>Fase 2 — JavaScript</h2>

        <label>
            <input type="checkbox" class="task">
            Variáveis e Tipos
        </label>

        <label>
            <input type="checkbox" class="task">
            Funções
        </label>

        <label>
            <input type="checkbox" class="task">
            Arrays e Objetos
        </label>

        <label>
            <input type="checkbox" class="task">
            Manipulação do DOM
        </label>

        <label>
            <input type="checkbox" class="task">
            Eventos
        </label>

    </section>


    <!-- FASE 3 -->
    <section class="phase">
        <h2>Fase 3 — Projetos</h2>

        <label>
            <input type="checkbox" class="task">
            Landing Page
        </label>

        <label>
            <input type="checkbox" class="task">
            ToDo App
        </label>

        <label>
            <input type="checkbox" class="task">
            Dashboard com API
        </label>

    </section>

</main>

<footer>
    <p>Frontend Learning Roadmap</p>
</footer>

<!-- JS -->
<script src="rodmap.js"></script>

</body>
</html>
